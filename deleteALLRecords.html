<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delete All Records – Record Manager</title>
    <!-- Load recordManager.js (must be in same folder) -->
    <script src="recordManager.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #f0f2f5;
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            background: white;
            max-width: 500px;
            width: 100%;
            border-radius: 28px;
            box-shadow: 0 20px 35px -10px rgba(0,0,0,0.1);
            padding: 30px;
            text-align: center;
        }
        h1 {
            color: #1e4663;
            margin-bottom: 20px;
            font-size: 24px;
        }
        .stats {
            background: #f8fafc;
            padding: 20px;
            border-radius: 20px;
            margin: 20px 0;
            border: 1px solid #e2edf2;
        }
        .record-count {
            font-size: 48px;
            font-weight: bold;
            color: #2c7da0;
            margin: 10px 0;
        }
        .record-label {
            color: #5b6e8c;
            font-size: 14px;
        }
        button {
            background: #dc3545;
            color: white;
            border: none;
            padding: 14px 28px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 40px;
            cursor: pointer;
            transition: background 0.2s;
            width: 100%;
            margin-top: 10px;
        }
        button:hover {
            background: #b02a37;
        }
        button:disabled {
            background: #adb5bd;
            cursor: not-allowed;
        }
        .refresh-btn {
            background: #6c757d;
            margin-top: 10px;
        }
        .refresh-btn:hover {
            background: #5a6268;
        }
        .message {
            margin-top: 20px;
            padding: 10px;
            border-radius: 12px;
            font-size: 14px;
        }
        .success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .warning {
            background: #fff3cd;
            color: #856404;
            border: 1px solid #ffeeba;
        }
        footer {
            margin-top: 25px;
            font-size: 12px;
            color: #6c757d;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🗑️ Delete All Records</h1>
    <p>This tool permanently removes all saved quotations from your browser's local storage.</p>

    <div class="stats">
        <div class="record-label">Current stored records</div>
        <div class="record-count" id="recordCount">0</div>
    </div>

    <button id="deleteAllBtn">⚠️ Delete All Records</button>
    <button id="refreshBtn" class="refresh-btn">🔄 Refresh Count</button>

    <div id="message" class="message"></div>
    <footer>
        This action cannot be undone. All saved client quotations will be lost.<br>
        Make sure you have a backup if needed.
    </footer>
</div>

<script>
    // Helper to get current record count from localStorage (using same key as recordManager.js)
    const STORAGE_KEY = 'quotation_records';

    function getRecordCount() {
        const stored = localStorage.getItem(STORAGE_KEY);
        if (!stored) return 0;
        try {
            const records = JSON.parse(stored);
            return records.length;
        } catch(e) {
            return 0;
        }
    }

    function updateCountDisplay() {
        const count = getRecordCount();
        document.getElementById('recordCount').innerText = count;
        return count;
    }

    function showMessage(text, type) {
        const msgDiv = document.getElementById('message');
        msgDiv.textContent = text;
        msgDiv.className = `message ${type}`;
        setTimeout(() => {
            if (msgDiv.className.includes('message')) {
                msgDiv.textContent = '';
                msgDiv.className = 'message';
            }
        }, 3000);
    }

    function deleteAllRecords() {
        const count = getRecordCount();
        if (count === 0) {
            showMessage('No records to delete.', 'warning');
            return;
        }

        const confirmMsg = `⚠️ WARNING: You are about to delete ALL ${count} saved quotation records.\n\nThis action is permanent and cannot be undone.\n\nAre you absolutely sure?`;
        if (!confirm(confirmMsg)) {
            showMessage('Deletion cancelled.', 'warning');
            return;
        }

        // Second confirmation for safety
        const secondConfirm = confirm(`Type "DELETE" to confirm permanent deletion of all ${count} records.`);
        if (secondConfirm !== true) {
            showMessage('Deletion cancelled.', 'warning');
            return;
        }

        try {
            // Clear the records from localStorage
            localStorage.removeItem(STORAGE_KEY);
            // Also reset the next ID counter if it exists (from recordManager.js)
            localStorage.removeItem('nextRecordId');
            
            // Update display
            updateCountDisplay();
            showMessage(`✅ Successfully deleted ${count} records.`, 'success');
            
            // Optional: If recordManager.js exposes a refresh function, call it.
            // But simply clearing localStorage is enough.
        } catch (err) {
            console.error(err);
            showMessage('❌ Error deleting records. Check console.', 'error');
        }
    }

    document.getElementById('deleteAllBtn').addEventListener('click', deleteAllRecords);
    document.getElementById('refreshBtn').addEventListener('click', () => {
        updateCountDisplay();
        showMessage('Record count refreshed.', 'success');
    });

    // Initial load
    updateCountDisplay();
</script>
</body>
</html>
