<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Quotation Generator – June Biago Graphics</title>
    <!-- Load external presets and record manager -->
    <script src="service_presets.js"></script>
    <script src="recordManager.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #e9ecef;
            font-family: 'Segoe UI', Roboto, sans-serif;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            max-width: 1100px;
            width: 100%;
            background: white;
            border-radius: 28px;
            box-shadow: 0 20px 35px -10px rgba(0,0,0,0.15);
            padding: 35px;
        }
        .header-row {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 15px;
        }
        .logo {
            max-height: 60px;
            width: auto;
            object-fit: contain;
        }
        h1 {
            color: #1e4663;
            margin: 0;
            flex: 1;
        }
        .form-group { margin-bottom: 20px; }
        label { font-weight: bold; display: block; margin-bottom: 6px; color: #0f3b5c; }
        input, select, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #cbd5e1;
            border-radius: 12px;
            font-family: inherit;
        }
        .client-service-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 20px;
        }
        button {
            background: #2c7da0;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:disabled {
            background: #adb5bd !important;
            cursor: not-allowed;
        }
        .back { display: inline-block; margin-bottom: 20px; color: #2c7da0; text-decoration: none; }
        hr { margin: 20px 0; }
        footer { margin-top: 30px; font-size: 12px; text-align: center; }
        .payment-group { display: flex; gap: 15px; flex-wrap: wrap; margin-top: 5px; }
        .payment-group label { font-weight: normal; display: inline-flex; align-items: center; gap: 5px; }
        .status { font-size: 12px; margin-top: 10px; color: #2e7d32; }
        .record-bar {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 16px;
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
            position: relative;
        }
        .search-wrapper {
            flex: 2;
            position: relative;
        }
        .search-wrapper input {
            width: 100%;
            padding: 10px;
        }
        .suggestions {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: white;
            border: 1px solid #ced4da;
            border-radius: 12px;
            max-height: 250px;
            overflow-y: auto;
            z-index: 1000;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            display: none;
        }
        .suggestions div {
            padding: 8px 12px;
            cursor: pointer;
            font-size: 13px;
            border-bottom: 1px solid #eee;
        }
        .suggestions div:hover {
            background-color: #e9ecef;
        }
        .reset-btn {
            background: #ffc107 !important;
            color: #212529;
            white-space: nowrap;
        }
        .button-group {
            display: flex;
            gap: 15px;
            margin: 20px 0;
            flex-wrap: wrap;
        }
        .button-group button {
            flex: 1;
            min-width: 120px;
        }
        .save-btn { background: #28a745 !important; }
        .delete-btn { background: #dc3545 !important; }
        .print-btn { background: #ff9800 !important; }
        .items-table {
            width: 100%;
            border-collapse: collapse;
            margin: 15px 0;
            font-size: 14px;
        }
        .items-table th, .items-table td {
            border: 1px solid #dee2e6;
            padding: 10px 8px;
            vertical-align: middle;
        }
        .items-table th {
            background: #1e4663;
            color: white;
            font-weight: 600;
            text-align: center;
        }
        .items-table input, .items-table select {
            width: 100%;
            padding: 8px;
            border: 1px solid #ced4da;
            border-radius: 8px;
            font-size: 13px;
        }
        .readonly-price {
            background-color: #e9ecef;
            cursor: not-allowed;
        }
        .total-cell {
            font-weight: 500;
            text-align: right;
            padding-right: 12px;
        }
        .action-btn {
            background: #d32f2f;
            padding: 4px 10px;
            font-size: 12px;
            border-radius: 20px;
        }
        .add-btn {
            background: #4caf50;
            margin: 10px 0 20px;
        }
    </style>
</head>
<body>
<div class="container">
    <a href="index.html" class="back">← Back to Hub</a>
    <div class="header-row">
        <img class="logo" src="https://www.dropbox.com/scl/fi/oz14jajgs67yc2e14aeyk/june_Logo_image_BW_FA.svg?rlkey=tpkox5h9y0sgj9bprd2yym4c4&raw=1" alt="Logo">
        <h1>Quotation / Proposal Generator</h1>
    </div>
    <div id="configStatus" class="status" style="margin-bottom: 10px;">Loading configuration...</div>

    <!-- Record Management Bar with dynamic suggestions -->
    <div class="record-bar">
        <div class="search-wrapper">
            <input type="text" id="recordSearchInput" autocomplete="off" placeholder="🔍 Type to search (ID or client name)...">
            <div id="suggestions" class="suggestions"></div>
        </div>
        <button type="button" id="resetFormBtn" class="reset-btn">🗑️ Reset Form</button>
    </div>

    <form id="quotationForm">
        <!-- Client details and service in one horizontal row -->
        <div class="client-service-row">
            <div class="form-group"><label>Client name *</label><input type="text" id="clientName" required></div>
            <div class="form-group"><label>Client email *</label><input type="email" id="clientEmail" required></div>
            <div class="form-group"><label>Contact number *</label><input type="tel" id="clientPhone" placeholder="+63 XXX XXX XXXX" required></div>
            <div class="form-group"><label>Select service *</label><select id="serviceSelect"></select></div>
        </div>

        <!-- Button group below client name row (top) -->
        <div class="button-group" id="topButtonGroup">
            <button type="button" id="saveTopBtn" class="save-btn" disabled>💾 Save Form to Record</button>
            <button type="button" id="deleteTopBtn" class="delete-btn" disabled>🗑️ Delete Record</button>
            <button type="button" id="printTopBtn" class="print-btn" disabled>🖨️ Print Quotation</button>
        </div>

        <div class="form-group"><label>Pre‑detailed scope of work (auto‑filled)</label>
            <textarea id="scopeOfWork" rows="4" readonly style="background:#f8fafc;"></textarea>
        </div>
        <div class="form-group"><label>Additional scope notes / custom requirements</label>
            <textarea id="additionalScope" placeholder="Add any extra details..."></textarea>
        </div>

        <h2>Itemized Pricing</h2>
        <table class="items-table" id="itemsTable">
            <thead>
                <tr><th style="width:40%">Item Description</th><th style="width:15%">Quantity</th><th style="width:20%">Unit Price (₱)</th><th style="width:15%">Total (₱)</th><th style="width:10%">Action</th></tr>
            </thead>
            <tbody id="itemsTableBody"></tbody>
        </table>
        <button type="button" id="addItemBtn" class="add-btn">+ Add item</button>

        <div class="form-group"><label>Discount (₱) or adjustment</label><input type="number" id="discount" value="0"></div>

        <div class="form-group"><label>Mode of payment (select all that apply)</label>
            <div class="payment-group">
                <label><input type="checkbox" class="paymentMethod" value="Bank transfer"> Bank transfer</label>
                <label><input type="checkbox" class="paymentMethod" value="GCash"> GCash</label>
                <label><input type="checkbox" class="paymentMethod" value="PayPal"> PayPal</label>
                <label><input type="checkbox" class="paymentMethod" value="Cash"> Cash</label>
            </div>
        </div>

        <div class="form-group"><label>Additional notes / terms (e.g., payment schedule)</label>
            <textarea id="quoteNotes" placeholder="Payment terms, delivery timeline, etc."></textarea>
        </div>

        <!-- Bottom button group -->
        <div class="button-group" id="bottomButtonGroup">
            <button type="button" id="saveBottomBtn" class="save-btn" disabled>💾 Save Form to Record</button>
            <button type="button" id="deleteBottomBtn" class="delete-btn" disabled>🗑️ Delete Record</button>
            <button type="button" id="printBottomBtn" class="print-btn" disabled>🖨️ Print Quotation</button>
        </div>

        <div id="saveStatus" class="status"></div>
    </form>
    <footer>Type in the search box – matching records appear below. Click a suggestion to load it. Press Enter to load the first match.</footer>
</div>

<script>
    // Global configuration (from service_presets.js)
    let scopeMap = {};
    let servicePresets = {};
    let currentService = "logo";
    let currentSelectedRecordId = null;
    let isRecordLoaded = false;

    function loadConfig() {
        if (typeof SERVICE_CONFIG !== 'undefined') {
            scopeMap = SERVICE_CONFIG.scopeMap;
            servicePresets = SERVICE_CONFIG.servicePresets;
            document.getElementById('configStatus').innerHTML = '✅ Configuration loaded from service_presets.js';
            document.getElementById('configStatus').style.color = '#2e7d32';
            const serviceSelect = document.getElementById('serviceSelect');
            serviceSelect.innerHTML = '';
            const labels = {
                logo: 'Logo & Brand Identity',
                print: 'Print Materials',
                social: 'Social Media Graphics',
                motion: 'Motion Design & Video Edits',
                computer: 'Computer Repair',
                automation: 'Process Automation',
                web: 'Web Design'
            };
            for (const key in scopeMap) {
                const option = document.createElement('option');
                option.value = key;
                option.textContent = labels[key] || key;
                serviceSelect.appendChild(option);
            }
            currentService = serviceSelect.value;
            updateScope();
        } else {
            document.getElementById('configStatus').innerHTML = '⚠️ service_presets.js not found. Using fallback defaults.';
            document.getElementById('configStatus').style.color = '#ed6c02';
            // Fallback hardcoded data
            scopeMap = {
                logo: "Logo & Brand Identity: includes primary logo, submark, color palette, font pairings, brand guide PDF, and business card mockup. Up to 3 rounds of revisions.",
                print: "Print Materials: design of flyer (A5/A6), poster (A3/A2), or brochure (bi-fold/tri-fold). Includes 3mm bleed, crop marks, print-ready PDF. 2 rounds of revisions.",
                social: "Social Media Graphics: custom designs for posts/stories. 10-post package includes Canva template. 1-2 revision rounds.",
                motion: "Motion Design & Video Edits: up to 60-second video or animation. Includes MP4 (1080p/4K), captions, and audio mix. 2 rounds of revisions.",
                computer: "Computer Repair / Upgrade / Maintenance: diagnostic, hardware repair, OS reinstall, upgrade installation. Parts cost not included. 30-day labor warranty.",
                automation: "Process Automation: consultation, script/automation tool development, basic documentation. 2 rounds of logic changes.",
                web: "Web Design: responsive landing page or multi-page site (up to 5 pages), contact form, basic SEO. 2 rounds of design revisions."
            };
            servicePresets = {
                logo: [ { name: "Logo Design", price: 5000 }, { name: "Full Brand Identity", price: 15000 }, { name: "Business Card Design", price: 2000 }, { name: "Brand Guide PDF", price: 3000 } ],
                print: [ { name: "Flyer (A5/A6)", price: 2500 }, { name: "Poster (A3/A2)", price: 3500 }, { name: "Brochure (bi-fold)", price: 5000 }, { name: "Brochure (tri-fold)", price: 6000 } ],
                social: [ { name: "Single Social Post", price: 1200 }, { name: "5-Post Package", price: 5000 }, { name: "10-Post Package", price: 8000 }, { name: "Story Template Set", price: 3000 } ],
                motion: [ { name: "Logo Animation (5-10 sec)", price: 4000 }, { name: "Social Media Reel (15-30 sec)", price: 5500 }, { name: "Short Ad (30-60 sec)", price: 10000 }, { name: "Full Video Edit (up to 3 min)", price: 18000 } ],
                computer: [ { name: "Diagnostic Fee", price: 500 }, { name: "OS Reinstall", price: 1200 }, { name: "Hardware Installation", price: 800 }, { name: "Data Backup", price: 600 } ],
                automation: [ { name: "Simple Script", price: 8000 }, { name: "Workflow Automation", price: 20000 }, { name: "API Integration", price: 15000 }, { name: "Consultation (per hour)", price: 1200 } ],
                web: [ { name: "Landing Page (1 page)", price: 10000 }, { name: "Multi-page Site (up to 5 pages)", price: 25000 }, { name: "E-commerce Integration", price: 20000 }, { name: "SEO Basic Setup", price: 5000 } ]
            };
            const serviceSelect = document.getElementById('serviceSelect');
            serviceSelect.innerHTML = '';
            const keys = ['logo','print','social','motion','computer','automation','web'];
            const labelNames = {
                logo: 'Logo & Brand Identity',
                print: 'Print Materials',
                social: 'Social Media Graphics',
                motion: 'Motion Design & Video Edits',
                computer: 'Computer Repair',
                automation: 'Process Automation',
                web: 'Web Design'
            };
            for (let key of keys) {
                const option = document.createElement('option');
                option.value = key;
                option.textContent = labelNames[key];
                serviceSelect.appendChild(option);
            }
            currentService = serviceSelect.value;
            updateScope();
        }
        attachFormValidation();
    }

    function updateScope() {
        currentService = document.getElementById('serviceSelect').value;
        document.getElementById('scopeOfWork').value = scopeMap[currentService] || "Please specify scope.";
        refreshAllItemRows();
    }

    // --- Itemized Pricing Table Functions (unchanged) ---
    function refreshAllItemRows() {
        const tbody = document.getElementById('itemsTableBody');
        const rows = tbody.querySelectorAll('tr');
        if (rows.length === 0) return;
        const currentItems = getItemsFromTable();
        tbody.innerHTML = '';
        for (let item of currentItems) {
            const match = servicePresets[currentService]?.find(p => p.name === item.desc);
            if (match) {
                addDropdownRow(item.desc, item.qty, match.price);
            } else {
                addManualRow(item.desc, item.qty, item.price);
            }
        }
    }

    function addDropdownRow(selectedName = null, qty = 1, price = null) {
        const presets = servicePresets[currentService];
        if (!presets || presets.length === 0) return;
        const tbody = document.getElementById('itemsTableBody');
        const row = tbody.insertRow();

        let optionsHtml = '';
        for (let p of presets) {
            const selected = (selectedName === p.name) ? 'selected' : '';
            optionsHtml += `<option value="${p.name}" data-price="${p.price}" ${selected}>${p.name}</option>`;
        }
        optionsHtml += `<option value="Other" data-price="0">Other (manual entry)</option>`;

        const defaultPrice = (price !== null) ? price : (presets.find(p => p.name === selectedName)?.price || presets[0].price);

        const cellDesc = row.insertCell(0);
        const select = document.createElement('select');
        select.className = 'itemSelect';
        select.innerHTML = optionsHtml;
        cellDesc.appendChild(select);

        const cellQty = row.insertCell(1);
        const qtyInput = document.createElement('input');
        qtyInput.type = 'number';
        qtyInput.className = 'itemQty';
        qtyInput.value = qty;
        qtyInput.min = 1;
        qtyInput.step = 1;
        cellQty.appendChild(qtyInput);

        const cellPrice = row.insertCell(2);
        const priceInput = document.createElement('input');
        priceInput.type = 'number';
        priceInput.className = 'itemPrice';
        priceInput.value = defaultPrice;
        priceInput.step = 100;
        priceInput.min = 0;
        priceInput.readOnly = true;
        priceInput.classList.add('readonly-price');
        priceInput.style.backgroundColor = '#e9ecef';
        cellPrice.appendChild(priceInput);

        const cellTotal = row.insertCell(3);
        const totalSpan = document.createElement('span');
        totalSpan.className = 'totalDisplay';
        totalSpan.style.fontWeight = 'bold';
        cellTotal.appendChild(totalSpan);
        cellTotal.classList.add('total-cell');

        const cellAction = row.insertCell(4);
        const removeBtn = document.createElement('button');
        removeBtn.textContent = '✖ Remove';
        removeBtn.className = 'action-btn';
        removeBtn.style.background = '#d32f2f';
        removeBtn.addEventListener('click', () => row.remove());
        cellAction.appendChild(removeBtn);

        function updateTotal() {
            const q = parseFloat(qtyInput.value) || 0;
            const p = parseFloat(priceInput.value) || 0;
            const total = q * p;
            totalSpan.textContent = `₱${total.toLocaleString()}`;
        }
        qtyInput.addEventListener('input', updateTotal);
        priceInput.addEventListener('input', updateTotal);
        updateTotal();

        select.addEventListener('change', function() {
            const selectedValue = select.value;
            const selectedOption = select.selectedOptions[0];
            const presetPrice = parseFloat(selectedOption.dataset.price) || 0;
            if (selectedValue === 'Other') {
                convertRowToManual(row, qtyInput.value, priceInput.value);
            } else {
                priceInput.value = presetPrice;
                priceInput.readOnly = true;
                priceInput.classList.add('readonly-price');
                priceInput.style.backgroundColor = '#e9ecef';
                updateTotal();
            }
        });
    }

    function addManualRow(description, qty = 1, price = 0) {
        const tbody = document.getElementById('itemsTableBody');
        const row = tbody.insertRow();

        const cellDesc = row.insertCell(0);
        const descInput = document.createElement('input');
        descInput.type = 'text';
        descInput.className = 'itemDescManual';
        descInput.value = description;
        descInput.placeholder = 'Describe the item';
        cellDesc.appendChild(descInput);

        const cellQty = row.insertCell(1);
        const qtyInput = document.createElement('input');
        qtyInput.type = 'number';
        qtyInput.className = 'itemQty';
        qtyInput.value = qty;
        qtyInput.min = 1;
        qtyInput.step = 1;
        cellQty.appendChild(qtyInput);

        const cellPrice = row.insertCell(2);
        const priceInput = document.createElement('input');
        priceInput.type = 'number';
        priceInput.className = 'itemPrice';
        priceInput.value = price;
        priceInput.step = 100;
        priceInput.min = 0;
        cellPrice.appendChild(priceInput);

        const cellTotal = row.insertCell(3);
        const totalSpan = document.createElement('span');
        totalSpan.className = 'totalDisplay';
        totalSpan.style.fontWeight = 'bold';
        cellTotal.appendChild(totalSpan);
        cellTotal.classList.add('total-cell');

        const cellAction = row.insertCell(4);
        const removeBtn = document.createElement('button');
        removeBtn.textContent = '✖ Remove';
        removeBtn.className = 'action-btn';
        removeBtn.style.background = '#d32f2f';
        removeBtn.addEventListener('click', () => row.remove());
        cellAction.appendChild(removeBtn);

        function updateTotal() {
            const q = parseFloat(qtyInput.value) || 0;
            const p = parseFloat(priceInput.value) || 0;
            const total = q * p;
            totalSpan.textContent = `₱${total.toLocaleString()}`;
        }
        qtyInput.addEventListener('input', updateTotal);
        priceInput.addEventListener('input', updateTotal);
        updateTotal();
    }

    function convertRowToManual(row, existingQty, existingPrice) {
        row.innerHTML = '';
        const cellDesc = row.insertCell(0);
        const descInput = document.createElement('input');
        descInput.type = 'text';
        descInput.className = 'itemDescManual';
        descInput.placeholder = 'Describe the item';
        cellDesc.appendChild(descInput);

        const cellQty = row.insertCell(1);
        const qtyInput = document.createElement('input');
        qtyInput.type = 'number';
        qtyInput.className = 'itemQty';
        qtyInput.value = existingQty;
        qtyInput.min = 1;
        qtyInput.step = 1;
        cellQty.appendChild(qtyInput);

        const cellPrice = row.insertCell(2);
        const priceInput = document.createElement('input');
        priceInput.type = 'number';
        priceInput.className = 'itemPrice';
        priceInput.value = existingPrice;
        priceInput.step = 100;
        priceInput.min = 0;
        cellPrice.appendChild(priceInput);

        const cellTotal = row.insertCell(3);
        const totalSpan = document.createElement('span');
        totalSpan.className = 'totalDisplay';
        totalSpan.style.fontWeight = 'bold';
        cellTotal.appendChild(totalSpan);
        cellTotal.classList.add('total-cell');

        const cellAction = row.insertCell(4);
        const removeBtn = document.createElement('button');
        removeBtn.textContent = '✖ Remove';
        removeBtn.className = 'action-btn';
        removeBtn.style.background = '#d32f2f';
        removeBtn.addEventListener('click', () => row.remove());
        cellAction.appendChild(removeBtn);

        function updateTotal() {
            const q = parseFloat(qtyInput.value) || 0;
            const p = parseFloat(priceInput.value) || 0;
            const total = q * p;
            totalSpan.textContent = `₱${total.toLocaleString()}`;
        }
        qtyInput.addEventListener('input', updateTotal);
        priceInput.addEventListener('input', updateTotal);
        updateTotal();
    }

    function getItemsFromTable() {
        const items = [];
        const tbody = document.getElementById('itemsTableBody');
        for (let row of tbody.rows) {
            let desc = '';
            const selectEl = row.querySelector('.itemSelect');
            if (selectEl) {
                const selectedText = selectEl.options[selectEl.selectedIndex]?.text || '';
                desc = selectedText;
                if (desc === 'Other') desc = '';
            } else {
                const manualInput = row.querySelector('.itemDescManual');
                if (manualInput) desc = manualInput.value.trim();
            }
            const qtyInput = row.querySelector('.itemQty');
            const priceInput = row.querySelector('.itemPrice');
            const qty = qtyInput ? parseFloat(qtyInput.value) || 0 : 0;
            const price = priceInput ? parseFloat(priceInput.value) || 0 : 0;
            if (desc && qty > 0) {
                items.push({ desc, qty, price, total: qty * price });
            }
        }
        return items;
    }

    // --- Form validation and button states ---
    function isFormValid() {
        const clientName = document.getElementById('clientName').value.trim();
        const clientEmail = document.getElementById('clientEmail').value.trim();
        const clientPhone = document.getElementById('clientPhone').value.trim();
        const items = getItemsFromTable();
        return clientName !== "" && clientEmail !== "" && clientPhone !== "" && items.length > 0;
    }

    function updateButtonStates() {
        const valid = isFormValid();
        const recordLoaded = (currentSelectedRecordId !== null);
        const saveBtns = [document.getElementById('saveTopBtn'), document.getElementById('saveBottomBtn')];
        saveBtns.forEach(btn => {
            btn.disabled = !valid;
            btn.textContent = recordLoaded ? "💾 Update Record" : "💾 Save Form to Record";
        });
        const deleteBtns = [document.getElementById('deleteTopBtn'), document.getElementById('deleteBottomBtn')];
        deleteBtns.forEach(btn => {
            if (btn) btn.disabled = !recordLoaded;
        });
        const printBtns = [document.getElementById('printTopBtn'), document.getElementById('printBottomBtn')];
        printBtns.forEach(btn => {
            btn.disabled = !(recordLoaded && valid);
        });
    }

    function attachFormValidation() {
        const inputs = ['clientName', 'clientEmail', 'clientPhone', 'serviceSelect', 'additionalScope', 'discount', 'quoteNotes'];
        inputs.forEach(id => {
            const el = document.getElementById(id);
            if (el) el.addEventListener('input', updateButtonStates);
        });
        const observer = new MutationObserver(() => updateButtonStates());
        observer.observe(document.getElementById('itemsTableBody'), { childList: true, subtree: true });
        updateButtonStates();
    }

    // --- Reset Form Function ---
    function resetForm() {
        document.getElementById('clientName').value = '';
        document.getElementById('clientEmail').value = '';
        document.getElementById('clientPhone').value = '';
        const serviceSelect = document.getElementById('serviceSelect');
        if (serviceSelect.options.length) serviceSelect.selectedIndex = 0;
        updateScope();
        document.getElementById('additionalScope').value = '';
        document.getElementById('discount').value = 0;
        document.getElementById('quoteNotes').value = '';
        document.querySelectorAll('.paymentMethod').forEach(cb => cb.checked = false);
        document.getElementById('itemsTableBody').innerHTML = '';
        currentSelectedRecordId = null;
        isRecordLoaded = false;
        document.getElementById('recordSearchInput').value = '';
        hideSuggestions();
        updateButtonStates();
        document.getElementById('saveStatus').innerHTML = '🔄 Form has been reset.';
        setTimeout(() => {
            if (document.getElementById('saveStatus').innerHTML === '🔄 Form has been reset.')
                document.getElementById('saveStatus').innerHTML = '';
        }, 2000);
    }

    // --- Dynamic suggestions (ONLY records with valid ID) ---
    function getRecordLabel(record) {
        const serviceText = getServiceLabel(record.service);
        return `${record.id} - ${record.clientName} - ${serviceText}`;
    }

    function filterRecords(query) {
        const records = getStoredRecords();
        if (!query.trim()) return [];
        const lowerQuery = query.toLowerCase();
        return records.filter(record => {
            // Only include records that have a valid ID
            if (record.id === undefined || record.id === null) return false;
            const label = getRecordLabel(record);
            return label.toLowerCase().includes(lowerQuery) || record.id.toString().includes(lowerQuery);
        });
    }

    function showSuggestions(suggestionsList) {
        const suggestionsDiv = document.getElementById('suggestions');
        suggestionsDiv.innerHTML = '';
        if (suggestionsList.length === 0) {
            suggestionsDiv.style.display = 'none';
            return;
        }
        suggestionsList.forEach(record => {
            const div = document.createElement('div');
            div.textContent = getRecordLabel(record);
            div.addEventListener('click', () => {
                loadRecord(record);
                hideSuggestions();
            });
            suggestionsDiv.appendChild(div);
        });
        suggestionsDiv.style.display = 'block';
    }

    function hideSuggestions() {
        document.getElementById('suggestions').style.display = 'none';
    }

    function loadRecord(record) {
        currentSelectedRecordId = record.id;
        isRecordLoaded = true;
        document.getElementById('clientName').value = record.clientName || '';
        document.getElementById('clientEmail').value = record.clientEmail || '';
        document.getElementById('clientPhone').value = record.clientPhone || '';
        document.getElementById('serviceSelect').value = record.service || 'logo';
        updateScope();
        document.getElementById('scopeOfWork').value = record.scopeOfWork || '';
        document.getElementById('additionalScope').value = record.additionalScope || '';
        document.getElementById('discount').value = record.discount || 0;
        document.getElementById('quoteNotes').value = record.quoteNotes || '';
        const allPaymentCbs = document.querySelectorAll('.paymentMethod');
        allPaymentCbs.forEach(cb => {
            cb.checked = record.paymentMethods ? record.paymentMethods.includes(cb.value) : false;
        });
        if (record.items && record.items.length) {
            rebuildItemsFromRecord(record.items);
        } else {
            document.getElementById('itemsTableBody').innerHTML = '';
        }
        document.getElementById('saveStatus').innerHTML = `📂 Loaded record: ${getRecordLabel(record)}`;
        document.getElementById('recordSearchInput').value = getRecordLabel(record);
        updateButtonStates();
    }

    function loadFirstMatch() {
        const query = document.getElementById('recordSearchInput').value.trim();
        if (!query) return;
        const matches = filterRecords(query);
        if (matches.length === 0) {
            alert(`No record matches "${query}".`);
            return;
        }
        loadRecord(matches[0]);
        hideSuggestions();
    }

    // --- Record Management Integration ---
    function getCurrentFormData() {
        const items = getItemsFromTable();
        const selectedPayments = Array.from(document.querySelectorAll('.paymentMethod:checked')).map(cb => cb.value);
        return {
            clientName: document.getElementById('clientName').value.trim(),
            clientEmail: document.getElementById('clientEmail').value.trim(),
            clientPhone: document.getElementById('clientPhone').value.trim(),
            service: document.getElementById('serviceSelect').value,
            scopeOfWork: document.getElementById('scopeOfWork').value,
            additionalScope: document.getElementById('additionalScope').value.trim(),
            items: items,
            discount: parseFloat(document.getElementById('discount').value) || 0,
            paymentMethods: selectedPayments,
            quoteNotes: document.getElementById('quoteNotes').value.trim()
        };
    }

    function rebuildItemsFromRecord(items) {
        const tbody = document.getElementById('itemsTableBody');
        tbody.innerHTML = '';
        for (let item of items) {
            const match = servicePresets[currentService]?.find(p => p.name === item.desc);
            if (match) {
                addDropdownRow(item.desc, item.qty, match.price);
            } else {
                addManualRow(item.desc, item.qty, item.price);
            }
        }
    }

    function saveCurrentRecord(isUpdate = false) {
        const formData = getCurrentFormData();
        if (!isFormValid()) {
            alert("Please fill in all required fields and add at least one item.");
            return;
        }
        if (isUpdate && currentSelectedRecordId) {
            const updatedRecord = updateFormRecord(currentSelectedRecordId, formData);
            if (updatedRecord) {
                document.getElementById('saveStatus').innerHTML = `✅ Record updated: ${updatedRecord.label}`;
                alert(`✅ Record updated successfully!\n\n${updatedRecord.label}`);
                currentSelectedRecordId = updatedRecord.id;
                isRecordLoaded = true;
                updateButtonStates();
                document.getElementById('recordSearchInput').value = getRecordLabel(updatedRecord);
            } else {
                alert("Error updating record.");
            }
        } else {
            const existingRecords = getStoredRecords();
            const duplicate = existingRecords.find(r => r.clientName === formData.clientName && r.service === formData.service);
            if (duplicate) {
                const createNew = confirm(`A record for "${formData.clientName} - ${getServiceLabel(formData.service)}" already exists.\nDo you want to create a duplicate?`);
                if (!createNew) return;
            }
            const newRecord = saveFormRecord(formData);
            document.getElementById('saveStatus').innerHTML = `✅ Record saved: ${newRecord.label}`;
            alert(`✅ Record saved successfully!\n\n${newRecord.label}`);
            currentSelectedRecordId = newRecord.id;
            isRecordLoaded = true;
            updateButtonStates();
            document.getElementById('recordSearchInput').value = getRecordLabel(newRecord);
        }
    }

    function deleteLoadedRecord() {
        if (!currentSelectedRecordId) return;
        const records = getStoredRecords();
        const record = records.find(r => r.id === currentSelectedRecordId);
        if (record && confirm(`Delete this record?\n\n${record.label}\n\nThis action cannot be undone.`)) {
            deleteFormRecord(currentSelectedRecordId);
            resetForm();
            document.getElementById('saveStatus').innerHTML = `🗑️ Record deleted.`;
            alert(`🗑️ Record deleted: ${record.label}`);
        }
    }

    function printQuotation() {
        if (!currentSelectedRecordId) return;
        const clientName = document.getElementById('clientName').value.trim();
        const clientEmail = document.getElementById('clientEmail').value.trim();
        const clientPhone = document.getElementById('clientPhone').value.trim();
        if (!isFormValid()) {
            alert("Form is incomplete. Please fill all required fields.");
            return;
        }
        const items = getItemsFromTable();
        const timestamp = new Date().toISOString().slice(0,19).replace(/:/g, '-').replace('T', '_');
        let subtotal = items.reduce((sum, i) => sum + i.total, 0);
        const discount = parseFloat(document.getElementById('discount').value) || 0;
        const total = subtotal - discount;
        const additionalScope = document.getElementById('additionalScope').value.trim();
        const quoteNotes = document.getElementById('quoteNotes').value.trim();
        const selectedPayments = Array.from(document.querySelectorAll('.paymentMethod:checked')).map(cb => cb.value);
        const paymentMethodsStr = selectedPayments.length ? selectedPayments.join(', ') : 'Not specified';
        const issueDate = getFormattedDate();
        const validUntil = new Date(Date.now() + 7*86400000).toLocaleDateString('en-PH', { year:'numeric', month:'long', day:'numeric' });
        const serviceText = document.getElementById('serviceSelect').options[document.getElementById('serviceSelect').selectedIndex].text;
        const htmlContent = buildQuotationHTML(clientName, clientEmail, clientPhone, timestamp, items, subtotal, discount, total, additionalScope, quoteNotes, paymentMethodsStr, issueDate, validUntil, serviceText);
        const newWindow = window.open();
        newWindow.document.write(htmlContent);
        newWindow.document.close();
    }

    function getServiceLabel(serviceKey) {
        const labels = {
            logo: 'Logo & Brand Identity',
            print: 'Print Materials',
            social: 'Social Media Graphics',
            motion: 'Motion Design & Video Edits',
            computer: 'Computer Repair',
            automation: 'Process Automation',
            web: 'Web Design'
        };
        return labels[serviceKey] || serviceKey;
    }

    // --- Print-Ready HTML Generation ---
    function getFormattedDate() {
        const d = new Date();
        return d.toLocaleDateString('en-PH', { year: 'numeric', month: 'long', day: 'numeric' });
    }

    function escapeHtml(str) { if (!str) return ""; return str.replace(/[&<>]/g, m => m==='&'?'&amp;':m==='<'?'&lt;':'&gt;'); }

    function buildQuotationHTML(clientName, clientEmail, clientPhone, timestamp, items, subtotal, discount, total, additionalScope, quoteNotes, paymentMethodsStr, issueDate, validUntil, serviceText) {
        const itemsHtml = items.map(i => `<tr><td style="text-align:left">${escapeHtml(i.desc)}</td><td style="text-align:center">${i.qty}</td><td style="text-align:right">₱${i.price.toLocaleString()}</td><td style="text-align:right">₱${i.total.toLocaleString()}</td>`).join('');
        const scopeOfWork = document.getElementById('scopeOfWork').value;
        return `<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Quotation_${clientName}_${timestamp}</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', Roboto, sans-serif; background: white; display: flex; justify-content: center; padding: 20px; }
    .page { max-width: 210mm; margin: 0 auto; background: white; padding: 20mm; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
    .header-logo { text-align: center; margin-bottom: 20px; }
    .header-logo img { max-height: 60px; width: auto; }
    .header-title { text-align: center; margin-bottom: 5px; font-size: 22px; font-weight: bold; color: #1e4663; letter-spacing: 1px; }
    .header-subtitle { text-align: center; margin-bottom: 25px; font-size: 12px; color: #2c7da0; border-bottom: 1px solid #dee2e6; padding-bottom: 10px; }
    h3 { margin: 15px 0 8px; color: #1e4663; }
    table { width: 100%; border-collapse: collapse; margin: 20px 0; page-break-inside: avoid; }
    th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
    th { background: #f2f2f2; }
    .total-row { font-weight: bold; background: #f9f9f9; }
    .sign-line { display: flex; justify-content: space-between; margin-top: 40px; gap: 40px; flex-wrap: wrap; page-break-inside: avoid; }
    .sign-field { flex: 1; border-top: 1px solid #000; padding-top: 6px; margin-top: 20px; font-size: 10pt; text-align: center; }
    .footer { margin-top: 40px; font-size: 9pt; text-align: center; border-top: 1px solid #ccc; padding-top: 10px; page-break-inside: avoid; }
    @media print {
        body { padding: 0; }
        .page { box-shadow: none; padding: 15mm; }
    }
</style>
</head>
<body>
<div class="page">
    <div class="header-logo">
        <img src="https://www.dropbox.com/scl/fi/oz14jajgs67yc2e14aeyk/june_Logo_image_BW_FA.svg?rlkey=tpkox5h9y0sgj9bprd2yym4c4&raw=1" alt="Logo">
    </div>
    <div class="header-title">JUNE BIAGO - DESIGN</div>
    <div class="header-subtitle">Automated Service Quotation</div>

    <p><strong>Prepared for:</strong> ${escapeHtml(clientName)}<br>
    <strong>Email:</strong> ${escapeHtml(clientEmail)}<br>
    <strong>Contact number:</strong> ${escapeHtml(clientPhone)}<br>
    <strong>Date issued:</strong> ${issueDate}<br>
    <strong>Valid until:</strong> ${validUntil} (7 days from issue date)<br>
    <strong>Service:</strong> ${escapeHtml(serviceText)}</p>

    <h3>Scope of Work</h3>
    <p>${escapeHtml(scopeOfWork)}</p>
    ${additionalScope ? `<p><strong>Additional scope:</strong> ${escapeHtml(additionalScope)}</p>` : ''}

    <h3>Itemized Pricing</h3>
    <table>
        <thead><tr><th>Description</th><th>Quantity</th><th>Unit Price (₱)</th><th>Total (₱)</th></tr></thead>
        <tbody>${itemsHtml}</tbody>
        <tr class="total-row"><td colspan="3" style="text-align:right;">Subtotal</td><td style="text-align:right">₱${subtotal.toLocaleString()}</td></tr>
        ${discount ? `<tr class="total-row"><td colspan="3" style="text-align:right;">Discount</td><td style="text-align:right">-₱${discount.toLocaleString()}</td></tr>` : ''}
        <tr class="total-row"><td colspan="3" style="text-align:right;">Total (₱)</td><td style="text-align:right">₱${total.toLocaleString()}</td></tr>
    </table>

    <h3>Mode of Payment</h3>
    <p>${escapeHtml(paymentMethodsStr)}</p>

    <h3>Terms & Notes</h3>
    <p>${escapeHtml(quoteNotes) || 'Standard payment terms: 50% deposit to start, 50% upon final approval. Late payment: 10% per week.'}</p>

    <h3>Acceptance</h3>
    <div class="sign-line">
        <div class="sign-field">Conformed by (signature): ________________________</div>
        <div class="sign-field">Printed name: ${escapeHtml(clientName)}</div>
    </div>
    <div class="sign-line">
        <div class="sign-field">Prepared by: June Biago (signature): ________________________</div>
        <div class="sign-field">Date: ${issueDate}</div>
    </div>
    <div class="footer">
        June Biago Graphics – Professional Design Services<br>
        This document is a quotation only. Work begins after signed contract and deposit.
    </div>
</div>
</body>
</html>`;
    }

    // --- Event listeners ---
    document.getElementById('addItemBtn').addEventListener('click', () => {
        const firstPreset = servicePresets[currentService]?.[0];
        if (firstPreset) {
            addDropdownRow(firstPreset.name, 1, firstPreset.price);
        } else {
            addManualRow("New item", 1, 0);
        }
        updateButtonStates();
    });
    document.getElementById('serviceSelect').addEventListener('change', () => {
        updateScope();
        updateButtonStates();
    });
    document.getElementById('saveTopBtn').addEventListener('click', () => saveCurrentRecord(currentSelectedRecordId !== null));
    document.getElementById('saveBottomBtn').addEventListener('click', () => saveCurrentRecord(currentSelectedRecordId !== null));
    document.getElementById('deleteTopBtn').addEventListener('click', deleteLoadedRecord);
    document.getElementById('deleteBottomBtn').addEventListener('click', deleteLoadedRecord);
    document.getElementById('printTopBtn').addEventListener('click', printQuotation);
    document.getElementById('printBottomBtn').addEventListener('click', printQuotation);
    document.getElementById('resetFormBtn').addEventListener('click', resetForm);

    const searchInput = document.getElementById('recordSearchInput');
    searchInput.addEventListener('input', (e) => {
        const query = e.target.value;
        const matches = filterRecords(query);
        showSuggestions(matches);
    });
    searchInput.addEventListener('blur', () => {
        setTimeout(hideSuggestions, 200);
    });
    searchInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            e.preventDefault();
            loadFirstMatch();
        }
    });

    loadConfig();
</script>
</body>
</html>
